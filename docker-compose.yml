services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/storage/voicescribe.sqlite3
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /app/storage
    volumes:
      - voicescribe_storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/storage/voicescribe.sqlite3
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /app/storage
    volumes:
      - voicescribe_storage:/app/storage
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO --pool=solo
    depends_on:
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  voicescribe_storage:
